# Daily signals sizing config (consumed by portfolio/sizing.py → SizingConfig).
#
# Defaults are deliberately conservative — long-or-cash, capped per name,
# bearish suppressed pending Section 15 fix. The portfolio simulator
# (Section 17) will refine these once policy comparison is complete.

policy: confidence_weighted       # see portfolio/sizing.py for supported values

max_per_name: 0.15                # cap weight in any single name at 15%
max_long_exposure: 0.80           # cap total long exposure at 80% (rest cash)
min_position_weight: 0.02         # don't bother with positions under 2% of book

enable_bearish: false             # suppress bearish calls; structural defect (handoff Section 15)

stop_loss_atr_multiple: 1.5       # stop-loss = entry - 1.5 * ATR(14)
entry_pullback_to: sma20          # buy limit base = min(last_close, SMA20)
max_entry_pullback_pct: 0.05      # never wait for a pullback deeper than 5% from last_close
exit_patience_atrs: 1.0           # trim/exit limit = max(last_close, last_close + 1 * ATR)

stale_composite_days: 7           # flag composites older than this many days
stale_signal_decay: 0.5           # multiply target weight by this when signal age > stale_composite_days (1.0 = no penalty)
composite_threshold: 0.15         # matches scoring.py direction_for_composite default (v1.1)

# Earnings-aware sizing (Section 26). When a name has earnings within
# pre_earnings_trim_days, scale its target weight by pre_earnings_size_factor.
# Set the factor to 1.0 or trim_days to 0 to disable.
pre_earnings_trim_days: 3
pre_earnings_size_factor: 0.5

# TradingAgents review gate. Disabled by default so review attachment can
# ship before enforcement. When enabled, sizing and tickets consume
# key_features.tradingagents_review.gate from each analysis report.
enable_tradingagents_review_gate: false
tradingagents_review_apply_to_sizing: true
tradingagents_review_apply_to_tickets: true
tradingagents_review_top_screener_n: 5

# Portfolio-level risk caps (Section 26). Applied after sector/beta math
# in daily_signals.py via portfolio/risk.py::apply_all_risk_caps. The
# trimmed weight becomes uninvested (cash), not redistributed.
risk_limits:
  max_sector_exposure: 0.50       # no sector > 50% of book
  max_portfolio_beta: 1.60        # cash-drag-inclusive weighted-avg beta
  max_pair_correlation: 0.85      # cap correlated secondary names vs the largest holding

# Same-day sector shock circuit breaker. If a mapped sector ETF drops at
# least drop_pct during the current session, new buys in that sector are
# stood down and existing-position target sizes are cut. This is meant for
# shock days such as broad semiconductor selloffs where the weekly/swing
# composite may still be bullish but execution should wait.
sector_shock_guard:
  enabled: true
  drop_pct: 0.03                  # trigger when sector ETF is down 3% or more
  new_buy_size_factor: 0.0        # 0 = no fresh buys in a shocked sector
  existing_position_size_factor: 0.5
  etfs:
    Semiconductors: SOXX
    Photonics: SOXX
    Tech-MegaCap: XLK
    Software: IGV
    Networking: XLK

universe:
  - NVDA
  - AMD
  - AVGO
  - MU
  - GLW
  - NET
  - RKLB
  - ALAB
  - COHR
  - FIG
  - LEU
  - LITE
  - AAOI
